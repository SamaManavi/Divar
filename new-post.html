            stroke="currentColor">

              d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15"/>

            stroke="currentColor">

<header class="fixed top-0 h-15 z-20 w-full bg-bgGray shadow-one">
    <!--top bar laptop-->
    <div class="flex items-center gap-x-3 h-full w-full px-5">
        <svg class="size-5">
            <use href="#arrow-right"></use>
        </svg>
        <span class="text-sm">بازگشت</span>
    </div>
</header>
<main class="max-w-120 mx-auto max-sm:px-2.5 mt-30 mb-20 space-y-10">

    <!--title-->
    <div class="w-full flex flex-col gap-y-5 items-start">
        <h3 class="text-xl font-bold">چه چیزی آگهی می کنید؟</h3>
        <span class="text-sm text-secondary/70">با جستجو در کادر زیر دسته آگهی را مشخص کنید.</span>
        <input type="number" placeholder="عنوان آگهی را وارد کنید"
               class="w-full border border-secondary/60 focus:border-primary hover:border-primary/50 cursor-pointer py-1.5 pr-2 rounded">
    </div>

    <div class="flex items-center justify-between">

        <h3 class="font-bold text-sm">نمایش راهنمای دسته بندی ها</h3>
        <label class="switch">
            <input id="has-picture" type="checkbox">
            <span class="slider"></span>
        </label>
    </div>

    <div class="flex flex-col">
        <ul class="*:border-b *:border-secondary/10 *:flex *:items-center *:justify-between *:py-4 *:hover:text-primary cursor-pointer">
            <li>
                <span class="text-sm">کالای دیجیتال</span>
                <svg class="size-5 rotate-90">
                    <use href="#chevron-down"></use>
                </svg>
            </li>
            <li>
                <span class="text-sm">وسایل نقلیه</span>
                <svg class="size-5 rotate-90">
                    <use href="#chevron-down"></use>
                </svg>
            </li>
            <li>
                <span class="text-sm">وسایل شخصی</span>
                <svg class="size-5 rotate-90">
                    <use href="#chevron-down"></use>
                </svg>
            </li>
        </ul>
    </div>


    <!--کلاس هیدن شده رو هر li کیلیک کنی نشون داده میشه-->
    <div>
        <span class="flex items-center gap-x-3 border-b border-secondary/10 py-4 *:hover:text-primary cursor-pointer">
            <svg class="size-4">
                <use href="#arrow-right"></use>
            </svg>
            <span class="text-sm">بازگشت به همه دسته ها</span>
        </span>

        <ul class="*:border-b *:border-secondary/10 *:flex *:items-center *:justify-between *:py-4 *:hover:text-primary cursor-pointer">
            <li>
                <span class="text-sm">سایل نقلیه</span>
                <svg class="size-5 rotate-90">
                    <use href="#chevron-down"></use>
                </svg>
            </li>
            <li>
                <span class="text-sm">وسایل شخصی</span>
                <svg class="size-5 rotate-90">
                    <use href="#chevron-down"></use>
                </svg>
            </li>
        </ul>
    </div>

</main>

</body>
</html>
